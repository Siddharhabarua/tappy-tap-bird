<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tappy Tap Bird</title>
<meta name="description" content="Tap to flap, dodge the crystal shards, beat your best score.">
<meta name="theme-color" content="#2D1B4E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-96.png" sizes="96x96">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tappy Bird">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1A1025;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    touch-action: manipulation;
    user-select: none;
  }
  #stage {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1A1025;
  }
  #frame {
    position: relative;
    width: 100%;
    max-width: 480px;
    height: 100%;
    max-height: 800px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #2D1B4E;
  }
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: center;
    padding-top: 28px;
    pointer-events: none;
    z-index: 5;
  }
  .score-num {
    font-size: 64px;
    font-weight: 800;
    color: #FFC857;
    text-shadow: 0 3px 0 rgba(0,0,0,0.35);
    letter-spacing: -1px;
    font-family: 'Courier New', monospace;
  }
  .best-pill {
    position: absolute;
    top: 18px;
    right: 18px;
    background: rgba(26,16,37,0.55);
    border: 1.5px solid rgba(255,200,87,0.4);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: #FFC857;
    font-weight: 700;
    z-index: 5;
    pointer-events: none;
  }
  .panel {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 82%;
    max-width: 340px;
    background: #1A1025;
    border: 3px solid #FF6B9D;
    border-radius: 22px;
    padding: 28px 24px 24px;
    text-align: center;
    z-index: 10;
    box-shadow: 0 12px 0 rgba(0,0,0,0.3);
  }
  .panel.hidden { display: none; }
  .panel h1 {
    font-size: 26px;
    color: #FFC857;
    font-weight: 800;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .panel .subtitle {
    font-size: 13px;
    color: #4ECDC4;
    margin-bottom: 18px;
    font-weight: 600;
  }
  .panel .row {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 10px;
  }
  .panel .row .label {
    font-size: 13px;
    color: #b8aed0;
    font-weight: 600;
  }
  .panel .row .value {
    font-size: 18px;
    color: #fff;
    font-weight: 800;
    font-family: 'Courier New', monospace;
  }
  .panel .new-best {
    font-size: 12px;
    color: #FFC857;
    font-weight: 700;
    margin-top: -4px;
    margin-bottom: 14px;
    display: none;
  }
  .panel .new-best.show { display: block; }
  .btn {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 14px 0;
    font-size: 17px;
    font-weight: 800;
    color: #1A1025;
    background: #FFC857;
    margin-top: 6px;
    box-shadow: 0 5px 0 #B8862C;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #B8862C; }
  .btn.secondary {
    background: transparent;
    color: #4ECDC4;
    box-shadow: none;
    border: 2px solid #4ECDC4;
    margin-top: 10px;
    padding: 10px 0;
    font-size: 14px;
  }
  .btn.secondary:active { transform: translateY(2px); }
  .tap-hint {
    position: absolute;
    bottom: 18%;
    left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    z-index: 5;
    pointer-events: none;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }
</style>
</head>
<body>

<div id="stage">
  <div id="frame">
    <canvas id="game"></canvas>

    <div class="hud" id="hud" style="display:none;">
      <div class="score-num" id="scoreNum">0</div>
    </div>
    <div class="best-pill" id="bestPill" style="display:none;">BEST <span id="bestVal">0</span></div>
    <div class="tap-hint" id="tapHint">tap to flap</div>

    <div class="panel" id="startPanel">
      <h1>Tappy Tap Bird</h1>
      <div class="subtitle">dodge the shards, beat your best</div>
      <button class="btn" id="startBtn">Start game</button>
    </div>

    <div class="panel hidden" id="overPanel">
      <h1>Game over</h1>
      <div class="subtitle" id="overSubtitle">nice run!</div>
      <div class="row"><span class="label">Score</span><span class="value" id="finalScore">0</span></div>
      <div class="row"><span class="label">Best</span><span class="value" id="finalBest">0</span></div>
      <div class="new-best" id="newBestTag">new best score!</div>
      <button class="btn" id="retryBtn">Play again</button>
    </div>
  </div>
</div>

<script>
(function () {
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var frame = document.getElementById('frame');

  var hud = document.getElementById('hud');
  var scoreNum = document.getElementById('scoreNum');
  var bestPill = document.getElementById('bestPill');
  var bestVal = document.getElementById('bestVal');
  var tapHint = document.getElementById('tapHint');
  var startPanel = document.getElementById('startPanel');
  var overPanel = document.getElementById('overPanel');
  var finalScore = document.getElementById('finalScore');
  var finalBest = document.getElementById('finalBest');
  var newBestTag = document.getElementById('newBestTag');
  var overSubtitle = document.getElementById('overSubtitle');
  var startBtn = document.getElementById('startBtn');
  var retryBtn = document.getElementById('retryBtn');

  var W = 0, H = 0, DPR = 1;
  var BEST_KEY = 'tappyTapBird_best';
  var best = 0;
  try { best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10) || 0; } catch (e) { best = 0; }

  var STATE_READY = 0, STATE_PLAYING = 1, STATE_OVER = 2;
  var state = STATE_READY;

  var bird, pillars, score, frameCount, groundY, deathFlash, particles;

  var GRAVITY = 1500;
  var FLAP_VELOCITY = -430;
  var PILLAR_GAP_BASE = 175;
  var PILLAR_W = 64;
  var PILLAR_SPACING = 235;
  var SCROLL_SPEED = 165;
  var BIRD_RADIUS = 16;

  function resize() {
    var rect = frame.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = rect.width;
    H = rect.height;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    groundY = H - 64;
  }
  window.addEventListener('resize', resize);
  resize();

  function makeBird() {
    return {
      x: W * 0.32,
      y: H * 0.42,
      vy: 0,
      rot: 0,
      flapPhase: 0,
      squash: 0
    };
  }

  function gapForScore(s) {
    var g = PILLAR_GAP_BASE - Math.min(s, 25) * 1.6;
    return Math.max(g, 132);
  }

  function spawnPillar(xPos) {
    var gap = gapForScore(score);
    var margin = 70;
    var centerMin = margin + gap / 2;
    var centerMax = groundY - margin - gap / 2;
    var center = centerMin + Math.random() * Math.max(centerMax - centerMin, 1);
    return { x: xPos, gapY: center, gapH: gap, passed: false };
  }

  function resetGame() {
    bird = makeBird();
    score = 0;
    frameCount = 0;
    deathFlash = 0;
    particles = [];
    pillars = [];
    var startX = W + 60;
    for (var i = 0; i < 4; i++) {
      pillars.push(spawnPillar(startX + i * PILLAR_SPACING));
    }
  }

  function flap() {
    if (state === STATE_READY) {
      startGame();
      return;
    }
    if (state === STATE_OVER) return;
    bird.vy = FLAP_VELOCITY;
    bird.squash = 1;
    bird.flapPhase = 1;
  }

  function startGame() {
    resetGame();
    state = STATE_PLAYING;
    startPanel.classList.add('hidden');
    overPanel.classList.add('hidden');
    hud.style.display = 'flex';
    bestPill.style.display = 'block';
    tapHint.style.display = 'block';
    bestVal.textContent = best;
    bird.vy = FLAP_VELOCITY;
    bird.squash = 1;
  }

  function endGame() {
    state = STATE_OVER;
    deathFlash = 1;
    tapHint.style.display = 'none';
    var isNewBest = score > best;
    if (isNewBest) {
      best = score;
      try { localStorage.setItem(BEST_KEY, String(best)); } catch (e) {}
    }
    finalScore.textContent = score;
    finalBest.textContent = best;
    bestVal.textContent = best;
    newBestTag.classList.toggle('show', isNewBest);
    var lines = [
      'nice run!', 'so close!', 'shards everywhere out there.',
      'keep flapping.', 'one more try?', 'almost had it!'
    ];
    overSubtitle.textContent = isNewBest ? 'new personal best!' : lines[Math.floor(Math.random() * lines.length)];
    setTimeout(function () {
      overPanel.classList.remove('hidden');
    }, 420);
  }

  function spawnBurst(x, y, color) {
    for (var i = 0; i < 10; i++) {
      var ang = Math.random() * Math.PI * 2;
      var spd = 80 + Math.random() * 140;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1,
        color: color
      });
    }
  }

  function update(dt) {
    frameCount++;

    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 600 * dt;
      p.life -= dt * 1.6;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (deathFlash > 0) deathFlash -= dt * 2.5;

    if (state !== STATE_PLAYING) return;

    bird.vy += GRAVITY * dt;
    bird.y += bird.vy * dt;
    bird.rot = Math.max(-0.5, Math.min(1.3, bird.vy / 600));
    if (bird.squash > 0) bird.squash -= dt * 4;

    for (var i2 = 0; i2 < pillars.length; i2++) {
      pillars[i2].x -= SCROLL_SPEED * dt;
    }

    var last = pillars[pillars.length - 1];
    if (last.x < W - PILLAR_SPACING) {
      pillars.push(spawnPillar(last.x + PILLAR_SPACING));
    }
    if (pillars[0].x < -PILLAR_W) {
      pillars.shift();
    }

    for (var j = 0; j < pillars.length; j++) {
      var pl = pillars[j];
      if (!pl.passed && pl.x + PILLAR_W / 2 < bird.x) {
        pl.passed = true;
        score++;
        scoreNum.textContent = score;
      }
    }

    if (bird.y + BIRD_RADIUS >= groundY) {
      bird.y = groundY - BIRD_RADIUS;
      spawnBurst(bird.x, bird.y, '#FFC857');
      endGame();
      return;
    }
    if (bird.y - BIRD_RADIUS <= 0) {
      bird.y = BIRD_RADIUS;
      bird.vy = 0;
    }

    for (var k = 0; k < pillars.length; k++) {
      var pp = pillars[k];
      var left = pp.x - PILLAR_W / 2;
      var right = pp.x + PILLAR_W / 2;
      if (bird.x + BIRD_RADIUS * 0.75 > left && bird.x - BIRD_RADIUS * 0.75 < right) {
        var gapTop = pp.gapY - pp.gapH / 2;
        var gapBottom = pp.gapY + pp.gapH / 2;
        if (bird.y - BIRD_RADIUS * 0.7 < gapTop || bird.y + BIRD_RADIUS * 0.7 > gapBottom) {
          spawnBurst(bird.x, bird.y, '#4ECDC4');
          endGame();
          return;
        }
      }
    }
  }

  function drawBackground() {
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#2D1B4E');
    grad.addColorStop(1, '#3D2768');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    var starSeed = 17;
    for (var i = 0; i < 28; i++) {
      var sx = (Math.sin(i * 12.9898 + starSeed) * 43758.5453 % 1 + 1) % 1 * W;
      var sy = (Math.sin(i * 78.233 + starSeed) * 43758.5453 % 1 + 1) % 1 * (H * 0.55);
      var tw = 0.5 + 0.5 * Math.sin(frameCount * 0.04 + i);
      ctx.globalAlpha = 0.25 + tw * 0.35;
      var r = i % 3 === 0 ? 2 : 1;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    var moonX = W * 0.78, moonY = H * 0.16, moonR = 26;
    ctx.fillStyle = '#FFE9B0';
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2D1B4E';
    ctx.beginPath();
    ctx.arc(moonX + 10, moonY - 6, moonR * 0.85, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGround() {
    ctx.fillStyle = '#1A1025';
    ctx.fillRect(0, groundY, W, H - groundY);
    ctx.fillStyle = '#241433';
    ctx.fillRect(0, groundY, W, 6);
    var offset = (frameCount * SCROLL_SPEED / 60) % 28;
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    for (var x = -28 + (state === STATE_PLAYING ? -offset : 0); x < W + 28; x += 28) {
      ctx.beginPath();
      ctx.moveTo(x, H);
      ctx.lineTo(x + 14, groundY + 6);
      ctx.lineTo(x + 28, H);
      ctx.fill();
    }
  }

  function drawPillarShard(cx, top, bottom, flip) {
    var halfW = PILLAR_W / 2;
    var grad = ctx.createLinearGradient(cx - halfW, 0, cx + halfW, 0);
    grad.addColorStop(0, '#2E8E84');
    grad.addColorStop(0.5, '#4ECDC4');
    grad.addColorStop(1, '#2E8E84');
    ctx.fillStyle = grad;

    ctx.beginPath();
    if (!flip) {
      ctx.moveTo(cx - halfW, top);
      ctx.lineTo(cx, top + 26);
      ctx.lineTo(cx + halfW, top);
      ctx.lineTo(cx + halfW * 0.62, bottom);
      ctx.lineTo(cx - halfW * 0.62, bottom);
      ctx.closePath();
    } else {
      ctx.moveTo(cx - halfW, top);
      ctx.lineTo(cx + halfW, top);
      ctx.lineTo(cx + halfW * 0.62, bottom);
      ctx.lineTo(cx, bottom - 26);
      ctx.lineTo(cx - halfW * 0.62, bottom);
      ctx.closePath();
    }
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath();
    if (!flip) {
      ctx.moveTo(cx - halfW * 0.15, top + 10);
      ctx.lineTo(cx - halfW * 0.05, top + 30);
      ctx.lineTo(cx - halfW * 0.3, bottom - 10);
      ctx.lineTo(cx - halfW * 0.5, bottom);
    } else {
      ctx.moveTo(cx - halfW * 0.5, top);
      ctx.lineTo(cx - halfW * 0.3, top + 10);
      ctx.lineTo(cx - halfW * 0.05, bottom - 30);
      ctx.lineTo(cx - halfW * 0.15, bottom - 10);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawPillars() {
    for (var i = 0; i < pillars.length; i++) {
      var pl = pillars[i];
      var gapTop = pl.gapY - pl.gapH / 2;
      var gapBottom = pl.gapY + pl.gapH / 2;
      drawPillarShard(pl.x, 0, gapTop, false);
      drawPillarShard(pl.x, gapBottom, groundY, true);
    }
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);
    var sq = bird.squash > 0 ? bird.squash * 0.18 : 0;
    ctx.scale(1 + sq, 1 - sq);

    ctx.fillStyle = 'rgba(255,200,87,0.18)';
    ctx.beginPath();
    ctx.ellipse(-BIRD_RADIUS * 1.6, 0, BIRD_RADIUS * 1.1, BIRD_RADIUS * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#FFC857';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    var wingUp = state === STATE_PLAYING && bird.squash > 0.4;
    ctx.fillStyle = '#FF6B9D';
    ctx.beginPath();
    if (wingUp) {
      ctx.ellipse(-3, 2, 9, 5, -0.5, 0, Math.PI * 2);
    } else {
      ctx.ellipse(-3, 4, 9, 5, 0.4, 0, Math.PI * 2);
    }
    ctx.fill();

    ctx.fillStyle = '#FF9F4A';
    ctx.beginPath();
    ctx.moveTo(BIRD_RADIUS - 2, -3);
    ctx.lineTo(BIRD_RADIUS + 9, 0);
    ctx.lineTo(BIRD_RADIUS - 2, 4);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#1A1025';
    ctx.beginPath();
    ctx.arc(5, -5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(6, -6, 1, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function draw() {
    drawBackground();
    drawPillars();
    drawGround();
    if (state !== STATE_OVER || deathFlash < 0.5) {
      drawBird();
    }
    drawParticles();
    if (deathFlash > 0) {
      ctx.fillStyle = 'rgba(255,107,157,' + (deathFlash * 0.35) + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  var lastTime = null;
  function loop(ts) {
    if (lastTime === null) lastTime = ts;
    var dt = Math.min((ts - lastTime) / 1000, 0.033);
    lastTime = ts;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function handleTap(e) {
    if (e.type === 'touchstart') e.preventDefault();
    flap();
  }
  frame.addEventListener('mousedown', handleTap);
  frame.addEventListener('touchstart', handleTap, { passive: false });
  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      flap();
    }
  });

  startBtn.addEventListener('click', function (e) { e.stopPropagation(); startGame(); });
  retryBtn.addEventListener('click', function (e) { e.stopPropagation(); startGame(); });

  bestVal.textContent = best;
  bird = makeBird();
  pillars = [spawnPillar(W + 100), spawnPillar(W + 100 + PILLAR_SPACING), spawnPillar(W + 100 + PILLAR_SPACING * 2)];
  particles = [];
  score = 0;
  frameCount = 0;

  requestAnimationFrame(loop);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('service-worker.js').catch(function () {});
    });
  }
})();
</script>
</body>
</html>
